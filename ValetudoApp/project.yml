name: ValetudoApp
options:
  bundleIdPrefix: de.simonluthe
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"

settings:
  base:
    SWIFT_VERSION: "5.9"
    DEVELOPMENT_TEAM: "J459G9CJT5"

targets:
  ValetudoApp:
    type: application
    platform: iOS
    sources:
      - ValetudoApp
    info:
      path: ValetudoApp/Info.plist
      properties:
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        UIApplicationSupportsIndirectInputEvents: true
        UILaunchScreen: {}
        UISupportedInterfaceOrientations~iPad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportedInterfaceOrientations~iPhone:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        CFBundleDisplayName: ValetudiOS
        UIRequiresFullScreen: true
        CFBundleIconName: AppIcon
        NSLocalNetworkUsageDescription: "Access local network to communicate with Valetudo robots"
        NSBonjourServices:
          - _valetudo._tcp
    settings:
      base:
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        PRODUCT_BUNDLE_IDENTIFIER: de.simonluthe.ValetudiOS
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        DEVELOPMENT_TEAM: "J459G9CJT5"

  ValetudoAppTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - ValetudoAppTests
    dependencies:
      - target: ValetudoApp
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: de.simonluthe.ValetudiOSTests
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/ValetudoApp.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/ValetudoApp"
        BUNDLE_LOADER: "$(TEST_HOST)"
        GENERATE_INFOPLIST_FILE: YES

schemes:
  ValetudoApp:
    build:
      targets:
        ValetudoApp: all
        ValetudoAppTests: [test]
    test:
      targets:
        - ValetudoAppTests
